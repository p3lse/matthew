    nav { position: fixed; top: 0; left: 0; width: 100%; padding: 3rem 4rem; display: flex; justify-content: space-between; text-transform: uppercase; font-size: 12px; font-weight: bold; background: #000; z-index: 100; letter-spacing: 1px; }
