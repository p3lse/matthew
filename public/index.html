<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matt | Esports Manager</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
    body { background-color: #000; color: #fff; overflow: hidden; }
    
    .video-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: -2; }
    video { width: 100%; height: 100%; object-fit: cover; opacity: 0.15; filter: grayscale(100%); }
    
    nav { position: fixed; top: 0; width: 100%; padding: 3rem 4rem; display: flex; justify-content: space-between; z-index: 10; text-transform: uppercase; font-size: 12px; font-weight: bold; letter-spacing: 1px; }
    nav a { color: #fff; text-decoration: none; margin-left: 3rem; transition: all 0.4s ease; }
    nav a:hover { opacity: 0.5; }
    nav a.active { opacity: 0.3; pointer-events: none; }
    
    .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
    
    .hero-title { font-size: clamp(4rem, 15vw, 15rem); font-weight: 900; letter-spacing: -0.05em; line-height: 0.8; text-transform: uppercase; display: flex; align-items: flex-start; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), letter-spacing 0.6s ease; cursor: default; }
    .hero-title:hover { transform: translateY(-10px); letter-spacing: -0.03em; color: #f0f0f0; }
    .reg-mark { font-size: 0.25em; margin-top: 1vw; margin-left: 0.5vw; opacity: 0.8; transition: opacity 0.4s ease; }
    .hero-title:hover .reg-mark { opacity: 1; }
    
    .fade-in { animation: fadeIn 1.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body class="fade-in">

<div class="video-container">
    <video autoplay loop muted playsinline preload="auto">
        <source src="drone-video.mp4" type="video/mp4">
    </video>
</div>

<nav>
    <div class="nav-left">New South Wales, AUS</div>
    <div class="nav-right">

        <a href="about.html">About</a>
        <a href="clients.html">Clients</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<div class="hero">
    <h1 class="hero-title">Matt<span class="reg-mark">&reg;</span></h1>
</div>

<script src="app.js"></script>
</body>
</html>
